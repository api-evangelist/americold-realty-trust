description: >-
  Americold Realty Trust is a global leader in temperature-controlled
  logistics, real estate, and value-added services, owning and operating one of
  the largest networks of cold storage warehouses in the world. The company
  serves food producers, retailers, and distributors with integrated logistics
  solutions, offering technology platforms such as i-3PL for customer-facing
  inventory and order visibility and EDI for system-to-system supply chain
  integration. While Americold provides customer-facing technology and
  integration capabilities, it does not currently publish a public
  developer-facing API portal with open OpenAPI documentation; integrations
  are established project-by-project through the Americold service desk and
  EDI onboarding process.
