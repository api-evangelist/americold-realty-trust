  - aid: americold-edi
    name: Americold EDI
    humanURL: https://www.americold.com/technology-automation/edi-electronic-data-interchange/
    baseURL: https://www.americold.com/technology-automation/edi-electronic-data-interchange/
    description: >-
      Americold provides Electronic Data Interchange (EDI) capabilities for
      automated data exchange between Americold and depositor (customer)
      systems, supporting orders, inventory, shipments, and other supply chain
      transactions. The integration uses the X12 warehousing 900-series
      transaction sets common across third-party logistics providers (940
      Warehouse Shipping Order, 943 Stock Transfer Shipment Advice, 944 Stock
      Transfer Receipt Advice, 945 Warehouse Shipping Advice, 947 Inventory
      Adjustment Advice, plus 856 ASN and 846 Inventory Inquiry).
    tags:
