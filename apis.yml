  - type: Features
    data:
      - name: Global Cold Storage Network
        description: >-
          Americold owns and operates one of the largest networks of
          temperature-controlled warehouses worldwide, with facilities across
          North America, Europe, Australia, New Zealand, and South America
          serving food producers, processors, distributors, and retailers.
      - name: i-3PL Customer Platform
        description: >-
          Customer-facing digital platform delivering real-time inventory
          tracking, order management, dock appointment scheduling, customizable
          alerts, and over 40 reporting tools across the Americold network from
          phone, tablet, or desktop.
      - name: EDI Supply Chain Integration
        description: >-
          Standards-based X12 EDI exchange of warehousing transactions
          (940/943/944/945/947) and shipping/inventory transactions
          (856, 846) between Americold's WMS/TMS/LMS/WES and depositor ERP
          systems for real-time supply chain visibility.
      - name: Lot-Level Traceability
        description: >-
          Item-lot granularity for receipts, holds, releases, and shipments
          enables food-safety traceability, recall readiness, and FSMA / HACCP
          compliance across the cold chain.
      - name: Multi-Temperature Zones
        description: >-
          Storage and handling across deep-frozen, frozen, refrigerated,
          cooler, and ambient temperature zones with documented temperature
          requirements and load-temperature recording on outbound shipments.
      - name: Value-Added Services
        description: >-
          Blast freezing, pick and pack, labeling and relabeling, repacking,
          kitting, staging, cross-dock, sloughing/tempering, plus light
          assembly and food processing services provided alongside storage.
  - type: UseCases
    data:
      - name: Cold Chain Outbound Fulfillment
        description: >-
          A depositor sends a 940 Warehouse Shipping Order to an Americold
          facility; Americold picks, stages, and ships product; a 945
          Warehouse Shipping Advice returns to the depositor for ERP
          reconciliation.
      - name: Inventory Visibility for Food Manufacturers
        description: >-
          Frozen and refrigerated food manufacturers monitor on-hand,
          available, committed, and held inventory across Americold facilities
          using i-3PL snapshots, dashboards, and reports.
      - name: Dock Appointment Scheduling
        description: >-
          Carriers and depositor logistics teams book, modify, and cancel
          dock appointments at Americold facilities through i-3PL to optimize
          throughput and reduce dwell time.
      - name: Lot Traceability and Recall
        description: >-
          Quality assurance and food safety teams trace a lot from receipt
          through every shipment to support recalls and regulatory holds.
      - name: Stock Transfer Between Facilities
        description: >-
          Move inventory between Americold facilities using 943/944 transfer
          transactions to balance network inventory and meet regional demand.
      - name: ERP-to-WMS Integration
        description: >-
          Connect SAP, Oracle, NetSuite, Microsoft Dynamics, and other ERP
          systems to Americold's WMS through EDI and managed integration
          partners.
  - type: Integrations
    data:
      - name: SPS Commerce
        description: >-
          SPS Commerce provides pre-built EDI connections used by depositors
          and 3PL trading partners to exchange warehousing transaction sets
          with Americold over a managed network.
      - name: Stedi
        description: >-
          Stedi's API-first EDI platform is used by modern engineering teams
          to translate, validate, and exchange X12 warehouse transactions
          with Americold programmatically.
      - name: Cleo Integration Cloud
        description: >-
          Cleo provides AS2, SFTP, and API integration tooling commonly used
          to connect depositor ERP systems to 3PL warehouse partners like
          Americold.
      - name: SAP and Oracle ERP
        description: >-
          Americold integrates with leading enterprise ERP systems via EDI
          for orders, inventory, and shipping reconciliation across the
          depositor's order-to-cash and procure-to-pay processes.
      - name: Customer ERP Systems
        description: >-
          Americold can integrate its supply chain management systems
          (WMS, LMS, TMS, WES) with a customer's ERP system for seamless
          information flow.
